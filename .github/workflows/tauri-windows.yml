name: Tauri Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: read

concurrency:
  group: tauri-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  GOFLAGS: -buildvcs=false

jobs:
  build:
    name: Build Windows Desktop Bundle
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .\src-tauri -> target

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build Tauri Windows bundle
        run: npm run tauri:build

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-bundle
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/release/ai-workflow-desktop.exe
          if-no-files-found: error
